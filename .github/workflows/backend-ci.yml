name: Backend CI

on:
  push:
    paths:
      - "app/**"
      - "trennkost/**"
      - "tests/**"
      - "scripts/**"
      - "requirements.txt"
      - "pytest.ini"
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "trennkost/**"
      - "tests/**"
      - "scripts/**"
      - "requirements.txt"
      - "pytest.ini"
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".github/workflows/backend-ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run default backend validation
        run: |
          chmod +x scripts/validate.sh
          ./scripts/validate.sh
